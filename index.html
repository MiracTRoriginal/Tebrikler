<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Görev Tamamlandı!</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:18px;
    padding:40px;
    width:500px;
    text-align:center;
    animation:fade .8s;
    box-shadow:0 0 30px rgba(0,0,0,.35);
}

h1{
    color:#00ff88;
    font-size:42px;
    margin-bottom:15px;
}

p{
    font-size:18px;
    color:#ddd;
    margin:15px 0;
    line-height:1.6;
}

button{
    margin-top:25px;
    background:#00ff88;
    color:black;
    border:none;
    padding:14px 30px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
    transition:.25s;
}

button:hover{
    transform:scale(1.06);
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="card">

<h1>🎉 Tebrikler!</h1>

<p>
Görevi başarıyla tamamladın.
</p>

<p>
Bulmacayı çözmeyi başardığın için teşekkürler.
</p>

<button onclick="location.reload()">
Tekrar Başla
</button>

</div>

</body>
</html>
